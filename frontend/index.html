<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KAVACH — Investigator's Terminal</title>
    <!-- Google Fonts: Outfit (UI) + JetBrains Mono (data/terminal) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'bg-base': '#0F1318',
              'bg-surface': '#161C23',
              'border-hairline': '#252D37',
              'text-primary': '#E8EAED',
              'text-secondary': '#7A8490',
              'accent-signal': '#E8A33D',
              'sev-critical': '#E24B4A',
              'sev-high': '#BA7517',
              'sev-verified': '#4FA66B',
              'mod-network': '#3FB6C7',
              'mod-enforce': '#C99A3B'
            },
            fontFamily: {
              sans: ['Outfit', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
              mono: ['"JetBrains Mono"', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace']
            }
          }
        }
      }
    </script>
    <style>
      /* Smooth transitions and basic global styles override */
      body {
        background-color: #14181D;
        color: #E8EAED;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body class="bg-bg-base text-text-primary font-sans antialiased selection:bg-accent-signal/25 selection:text-text-primary">
    <div id="root" class="min-h-screen flex flex-col"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: kavach
      POSTGRES_PASSWORD: kavach
      POSTGRES_DB: kavach
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kavach"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  migrator:
    build: ./backend
    command: alembic upgrade head
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://kavach:kavach@postgres:5432/kavach
    depends_on:
      postgres: { condition: service_healthy }
    restart: "no"

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://kavach:kavach@postgres:5432/kavach
      REDIS_URL: redis://redis:6379/0
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrator: { condition: service_completed_successfully }

  worker:
    build: ./backend
    command: arq app.workers.main.WorkerSettings
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://kavach:kavach@postgres:5432/kavach
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrator: { condition: service_completed_successfully }

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    depends_on: [backend]

  shield-pwa:
    build: ./shield-pwa
    ports: ["8080:8080"]
    depends_on: [backend]

volumes:
  pgdata:

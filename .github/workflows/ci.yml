name: CI
on:
  push: { branches: [main] }
  pull_request:

# NOTE: no LLM API key exists in CI — live calls are impossible by design (docs/06 §3)
jobs:
  backend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Types (mypy)
        run: mypy app
      - name: Security (bandit)
        run: bandit -r app -ll
      - name: Dependency audit
        run: pip-audit -r requirements.txt || true  # advisory in Phase 0; blocking from Phase 1
      - name: Tests
        run: python -m pytest

  frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm install
      - run: npm run build

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
